<div class="d-flex" id="wrapper">
  <!-- Barra Lateral (Sidebar) -->
  <div class="border-end" id="sidebar-wrapper" 
       [class.collapsed]="!sidebarOpen()"
       (mouseenter)="sidebarOpen.set(true)"
       (mouseleave)="sidebarOpen.set(false)">
    <div class="sidebar-heading border-bottom d-flex align-items-center justify-content-between p-3 text-white">
      <div class="d-flex align-items-center gap-2">
        <i class="bi bi-droplet-half text-primary fs-4"></i>
        <span class="fw-bold tracking-wide" *ngIf="sidebarOpen()">IcaSmart-Water</span>
      </div>
      <button class="btn btn-sm btn-link text-white d-md-none" (click)="toggleSidebar()">
        <i class="bi bi-x-lg"></i>
      </button>
    </div>

    <!-- Menú de Enlaces -->
    <div class="list-group list-group-flush p-2">
      <!-- Dashboard -->
      <a routerLink="/dashboard" routerLinkActive="sidebar-active" class="list-group-item list-group-item-action d-flex align-items-center py-2.5 px-3 rounded mb-1 text-white border-0 transition-all">
        <i class="bi bi-grid-1x2-fill me-3 fs-5"></i>
        <span *ngIf="sidebarOpen()">Dashboard</span>
      </a>

      <!-- Monitoreo (Agrónomo y Gerente) -->
      <a routerLink="/monitoreo" routerLinkActive="sidebar-active" class="list-group-item list-group-item-action d-flex align-items-center py-2.5 px-3 rounded mb-1 text-white border-0 transition-all">
        <i class="bi bi-cpu-fill me-3 fs-5"></i>
        <span *ngIf="sidebarOpen()">Monitoreo IoT</span>
      </a>

      <!-- Control de Riego (Solo Agrónomo y Gerente) -->
      <a *ngIf="verificarRol(['AGRONOMO', 'GERENTE'])" routerLink="/riego" routerLinkActive="sidebar-active" class="list-group-item list-group-item-action d-flex align-items-center py-2.5 px-3 rounded mb-1 text-white border-0 transition-all">
        <i class="bi bi-gear-wide-connected me-3 fs-5"></i>
        <span *ngIf="sidebarOpen()">Control de Riego</span>
      </a>

      <!-- Reportes ANA (Todos) -->
      <a routerLink="/reportes" routerLinkActive="sidebar-active" class="list-group-item list-group-item-action d-flex align-items-center py-2.5 px-3 rounded mb-1 text-white border-0 transition-all">
        <i class="bi bi-file-earmark-bar-graph-fill me-3 fs-5"></i>
        <span *ngIf="sidebarOpen()">Reportes ANA</span>
      </a>

      <!-- Administración (Solo Gerente) -->
      <a *ngIf="verificarRol(['GERENTE'])" routerLink="/admin" routerLinkActive="sidebar-active" class="list-group-item list-group-item-action d-flex align-items-center py-2.5 px-3 rounded mb-1 text-white border-0 transition-all">
        <i class="bi bi-sliders me-3 fs-5"></i>
        <span *ngIf="sidebarOpen()">Administración</span>
      </a>
    </div>

    <!-- Info del Usuario al pie de la barra lateral -->
    <div class="sidebar-footer border-top p-3 text-white mt-auto w-100" *ngIf="sidebarOpen()">
      <div class="d-flex align-items-center gap-2 mb-2">
        <div class="avatar bg-primary text-white d-flex align-items-center justify-content-center fw-bold rounded-circle">
          {{ usuarioNombres().substring(0,2).toUpperCase() }}
        </div>
        <div class="overflow-hidden">
          <div class="fw-semibold text-truncate small">{{ usuarioNombres() }}</div>
          <div class="text-muted text-uppercase tracking-wider" style="font-size: 0.65rem;">{{ usuarioRol() }}</div>
        </div>
      </div>
      <button class="btn btn-outline-danger btn-sm w-100 py-1.5" (click)="logout()">
        <i class="bi bi-box-arrow-left me-1"></i>Salir
      </button>
    </div>
  </div>

  <!-- Contenido de la Página -->
  <div id="page-content-wrapper" class="w-100 d-flex flex-column">
    <!-- Barra de Navegación Superior (Navbar) -->
    <nav class="navbar navbar-expand-lg border-bottom px-3 py-2 bg-body">
      <div class="container-fluid p-0">
        <button class="btn btn-outline-secondary btn-sm me-3 border-0" (click)="toggleSidebar()">
          <i class="bi bi-list fs-5"></i>
        </button>

        <div class="d-flex align-items-center gap-3 ms-auto">


          <!-- Botón de Alternancia de Modo Claro/Oscuro -->
          <button class="btn btn-outline-secondary border-0 btn-sm" (click)="toggleTheme()" title="Cambiar Tema">
            <i class="bi fs-5" [ngClass]="darkMode() ? 'bi-sun-fill text-warning' : 'bi-moon-fill'"></i>
          </button>

          <!-- Perfil Móvil (Cerrar sesión cuando el sidebar está colapsado o móvil) -->
          <button class="btn btn-outline-danger border-0 btn-sm d-md-none" (click)="logout()" title="Cerrar sesión">
            <i class="bi bi-box-arrow-left fs-5"></i>
          </button>
        </div>
      </div>
    </nav>

    <!-- Contenedor Principal de la Ruta -->
    <main class="container-fluid p-4 overflow-y-auto flex-grow-1" style="max-height: calc(100vh - 57px);">
      <router-outlet></router-outlet>
    </main>

    <!-- Footer Corporativo -->
    <footer class="text-center py-3 border-top mt-auto bg-body text-muted small">
      &copy; 2026 FundoCorp - IcaSmart-Water. Todos los derechos reservados.
    </footer>
  </div>
</div>
